<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Tiny Sprout — CC0 спрайты (Kenney)</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { width:100%; height:100%; overflow:hidden; touch-action:none; background:#8fd06a; }
  canvas { display:block; image-rendering:auto; }
  #hint { position:fixed; left:50%; bottom:14px; transform:translateX(-50%);
    background:rgba(75,60,44,.85); color:#fdf8ec; font:600 13px/1.3 system-ui,sans-serif;
    padding:8px 16px; border-radius:16px; pointer-events:none; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hint">CC0 спрайты Kenney · тащи — двигать · колесо/щипок — зум</div>
<script>
'use strict';
const cv = document.getElementById('c'), ctx = cv.getContext('2d');
let W = 0, H = 0, DPR = Math.min(devicePixelRatio || 1, 2);
function resize() { W = innerWidth; H = innerHeight; cv.width = W * DPR; cv.height = H * DPR; cv.style.width = W + 'px'; cv.style.height = H + 'px'; }
addEventListener('resize', resize); resize();

const BASE = 'assets/kenney-bases/Isometric/', FARM = 'assets/kenney-farm/Isometric/';
const SPR = {
  grass: BASE + 'square_grass_flat_N.png',
  farmland: FARM + 'dirtFarmland_N.png',
  corn: FARM + 'corn_N.png',
  cornYoung: FARM + 'cornYoung_N.png',
  fenceN: FARM + 'fenceLow_N.png', fenceE: FARM + 'fenceLow_E.png',
  fenceS: FARM + 'fenceLow_S.png', fenceW: FARM + 'fenceLow_W.png',
  hay: FARM + 'hayBalesStacked_N.png',
  sacks: FARM + 'sacksCrate_N.png',
  wall: FARM + 'woodWallWindow_N.png',
  wallDoor: FARM + 'woodWallDoorClosed_S.png',
  roof: FARM + 'roof_N.png',
  chimneyB: FARM + 'chimneyBase_N.png', chimneyT: FARM + 'chimneyTop_N.png',
};
const IMG = {};
Promise.all(Object.entries(SPR).map(([k, src]) => new Promise(res => {
  const im = new Image(); im.onload = () => { IMG[k] = im; res(); }; im.onerror = () => { console.warn('fail', src); res(); }; im.src = src;
}))).then(start);

// камера
const cam = { x: 0, y: 0, zoom: .5, min: .28, max: 1.1 };
function screen(sx, sy) { return { x: W / 2 + (sx - cam.x) * cam.zoom, y: H / 2 + (sy - cam.y) * cam.zoom }; }
// ввод
const pts = new Map(); let drag = null, pinch = null;
cv.addEventListener('pointerdown', e => { cv.setPointerCapture(e.pointerId); pts.set(e.pointerId, e); g(); });
cv.addEventListener('pointermove', e => { if (!pts.has(e.pointerId)) return; pts.set(e.pointerId, e); m(); });
cv.addEventListener('pointerup', e => { pts.delete(e.pointerId); drag = pinch = null; g(); });
cv.addEventListener('pointercancel', e => { pts.delete(e.pointerId); drag = pinch = null; });
function g() { const a = [...pts.values()]; if (a.length === 1) { drag = { px: a[0].clientX, py: a[0].clientY }; pinch = null; } else if (a.length >= 2) { pinch = { d: Math.hypot(a[0].clientX - a[1].clientX, a[0].clientY - a[1].clientY), z: cam.zoom }; drag = null; } }
function m() { const a = [...pts.values()]; if (drag && a.length === 1) { cam.x -= (a[0].clientX - drag.px) / cam.zoom; cam.y -= (a[0].clientY - drag.py) / cam.zoom; drag.px = a[0].clientX; drag.py = a[0].clientY; } else if (pinch && a.length >= 2) { const d = Math.hypot(a[0].clientX - a[1].clientX, a[0].clientY - a[1].clientY); cam.zoom = Math.max(cam.min, Math.min(cam.max, pinch.z * d / pinch.d)); } }
addEventListener('wheel', e => { cam.zoom = Math.max(cam.min, Math.min(cam.max, cam.zoom * (e.deltaY < 0 ? 1.1 : 1 / 1.1))); }, { passive: true });

// изо-сетка: шаг из ширины тайла травы
let TW = 128, TH = 64, GH = 0; // half width/height, ground surface offset
function iso(gx, gy) { return { sx: (gx - gy) * TW, sy: (gx + gy) * TH }; }
const depth = (gx, gy, b = 0) => (gx + gy) * 1000 + b;

// нарисовать спрайт с якорем по низу-центру тайла
function put(img, gx, gy, lift = 0) {
  if (!img) return;
  const p = iso(gx, gy), s = screen(p.sx, p.sy);
  const w = img.width * cam.zoom, h = img.height * cam.zoom;
  // якорь: центр по X, низ тайла — на s.y + TH*zoom (низ ромба), спрайт стоит на поверхности
  ctx.drawImage(img, s.x - w / 2, s.y + TH * cam.zoom - h - lift * cam.zoom, w, h);
}

const scene = [];
function add(gx, gy, bias, fn) { scene.push({ gx, gy, bias, fn }); }

function start() {
  if (IMG.grass) { TW = IMG.grass.width / 2; TH = IMG.grass.width / 4; }
  // земля
  for (let gx = -6; gx <= 6; gx++) for (let gy = -6; gy <= 6; gy++)
    add(gx, gy, -800, () => put(IMG.grass, gx, gy));
  // грядки с кукурузой (участок)
  const beds = [[-2, -2], [-1, -2], [-2, -1], [-1, -1], [0, -1], [-2, 0], [-1, 0]];
  beds.forEach(([x, y], i) => { add(x, y, -400, () => put(IMG.farmland, x, y)); add(x, y, 0, () => put(i % 2 ? IMG.corn : IMG.cornYoung, x, y, 4)); });
  // заборчик вокруг участка справа
  add(2, -2, 0, () => put(IMG.fenceN, 2, -2)); add(3, -2, 0, () => put(IMG.fenceN, 3, -2));
  add(2, 0, 0, () => put(IMG.fenceE, 2, 0)); add(3, 1, 0, () => put(IMG.fenceE, 3, 1));
  // амбар: стена + дверь + крыша + труба (стек)
  add(2, 2, 0, () => { put(IMG.wall, 2, 2); put(IMG.roof, 2, 2, 64); put(IMG.chimneyB, 2, 2, 96); put(IMG.chimneyT, 2, 2, 116); });
  add(3, 2, 0, () => { put(IMG.wallDoor, 3, 2); put(IMG.roof, 3, 2, 64); });
  // сено и мешки
  add(0, 2, 0, () => put(IMG.hay, 0, 2));
  add(-1, 3, 0, () => put(IMG.sacks, -1, 3));
  requestAnimationFrame(frame);
}

function frame() {
  ctx.save(); ctx.scale(DPR, DPR);
  const bg = ctx.createLinearGradient(0, 0, 0, H);
  bg.addColorStop(0, '#cdeccf'); bg.addColorStop(.4, '#a7dd86'); bg.addColorStop(1, '#8fd06a');
  ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);
  ctx.imageSmoothingEnabled = true;
  const items = scene.slice().sort((a, b) => depth(a.gx, a.gy, a.bias) - depth(b.gx, b.gy, b.bias));
  for (const it of items) it.fn();
  ctx.restore();
  requestAnimationFrame(frame);
}
</script>
</body>
</html>
